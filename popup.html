<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --card: #18181b;
      --border: #27272a;
      --text-main: #fafafa;
      --text-muted: #a1a1aa;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #10b981;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 24px 20px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .icon-box {
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      color: white;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
    }

    .icon-box svg {
      width: 28px;
      height: 28px;
    }

    .status-badge {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      padding: 4px 10px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--success);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 13px;
      color: var(--text-muted);
      margin: 0 0 24px 0;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: #52525b;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon-box">
      <!-- Stack icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
      </svg>
    </div>

    <div class="status-badge">
      <div class="status-dot"></div>
      SİSTEM AKTİF
    </div>

    <h1>X-Bot Pro</h1>
    <p>Hesabınızı profesyonelce yönetin ve kitle etkileşiminizi artırın.</p>

    <button id="openDash" class="btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="3" x2="9" y2="21"></line>
        <line x1="3" y1="9" x2="21" y2="9"></line>
      </svg>
      KONTROL PANELİNE GİT
    </button>

    <div class="footer">v3.0 Professional Edition</div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
